<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>רשימת מטלות - Moodle</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Rubik', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f9fafb;
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="checkbox"] {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 0.375rem;
        }
    </style>
</head>
<body class="text-gray-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useMemo } = React;

        // אייקונים
        const CalendarIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>);
        const MapPin = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>);
        const Clock = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
        const AlertCircle = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>);
        const RefreshCw = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
        const AlignRight = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="21" x2="3" y1="6" y2="6"/><line x1="21" x2="9" y1="12" y2="12"/><line x1="21" x2="7" y1="18" y2="18"/></svg>);
        const Book = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>);
        const LogOut = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>);
        const ArrowRight = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>);
        const LinkIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>);

        function App() {
          const [uid, setUid] = useState(localStorage.getItem('moodle_uid') || null);
          const [view, setView] = useState(uid ? 'calendar' : 'landing');
          
          const [lastUpdated, setLastUpdated] = useState(() => localStorage.getItem('moodle_last_updated') || null);
          const [events, setEvents] = useState(() => {
            try {
              const saved = localStorage.getItem('moodle_events');
              if (saved) {
                return JSON.parse(saved).map(ev => ({
                  ...ev,
                  start: new Date(ev.start),
                  end: ev.end ? new Date(ev.end) : undefined
                }));
              }
            } catch (e) { console.error(e); }
            return [];
          });
          
          const [completedIds, setCompletedIds] = useState(() => {
            try {
              const saved = localStorage.getItem('moodle_completed');
              return saved ? JSON.parse(saved) : {};
            } catch (e) { return {}; }
          });

          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          
          const [registerUrl, setRegisterUrl] = useState('');
          const [registering, setRegistering] = useState(false);

          const fetchCompletedTasks = async (currentUid) => {
            if (!currentUid) return;
            try {
              const response = await fetch(`https://pages-api4.vercel.app/api/tasks?uid=${currentUid}`);
              if (response.ok) {
                const data = await response.json();
                setCompletedIds(data || {});
                localStorage.setItem('moodle_completed', JSON.stringify(data || {}));
              }
            } catch (error) { console.error("Error fetching tasks", error); }
          };

          const fetchEvents = async (currentUid) => {
            if (!currentUid) return;
            setLoading(true);
            setError(null);
            
            try {
              const response = await fetch(`https://pages-api4.vercel.app/api/events?uid=${currentUid}`);
              
              if (!response.ok) {
                if (response.status === 401) {
                  handleLogout();
                  throw new Error('החיבור פג תוקף. אנא הרשם מחדש.');
                }
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `שגיאה בתקשורת מול השרת (קוד ${response.status}).`);
              }
              
              const data = await response.json();
              
              const formattedEvents = data.map(ev => ({
                ...ev,
                start: new Date(ev.start),
                end: ev.end ? new Date(ev.end) : undefined
              }));

              setEvents(formattedEvents);
              localStorage.setItem('moodle_events', JSON.stringify(formattedEvents));
              
              const now = new Date().toISOString();
              setLastUpdated(now);
              localStorage.setItem('moodle_last_updated', now);
              
            } catch (err) {
              setError(err.message);
            } finally {
              setLoading(false);
            }
          };

          const handleRegisterSubmit = async (e) => {
            e.preventDefault();
            if (!registerUrl.includes('moodle.tau.ac.il')) {
              setError('אנא הכנס קישור תקין ממערכת Moodle של אוניברסיטת תל אביב.');
              return;
            }

            setRegistering(true);
            setError(null);

            try {
              const response = await fetch('https://pages-api4.vercel.app/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: registerUrl })
              });

              const data = await response.json();

              if (!response.ok) {
                throw new Error(data.error || 'שגיאה בהרשמה. ודא שהקישור תקין.');
              }

              if (data.success && data.uid) {
                localStorage.setItem('moodle_uid', data.uid);
                setUid(data.uid);
                setView('calendar');
                fetchEvents(data.uid);
                fetchCompletedTasks(data.uid);
              }
            } catch (err) {
              setError(err.message);
            } finally {
              setRegistering(false);
            }
          };

          const handleLogout = () => {
            localStorage.clear();
            setUid(null);
            setEvents([]);
            setCompletedIds({});
            setView('landing');
            setRegisterUrl('');
          };

          useEffect(() => {
            if (view === 'calendar' && uid) {
              const savedLastUpdated = localStorage.getItem('moodle_last_updated');
              const oneDayInMs = 24 * 60 * 60 * 1000;
              let shouldAutoRefresh = false;

              if (savedLastUpdated) {
                const timeSinceUpdate = new Date() - new Date(savedLastUpdated);
                if (timeSinceUpdate >= oneDayInMs) {
                  shouldAutoRefresh = true;
                }
              } else {
                shouldAutoRefresh = true;
              }

              if (events.length === 0 || shouldAutoRefresh) {
                fetchEvents(uid);
              }
              
              fetchCompletedTasks(uid);
            }
          }, [view, uid]);

          const groupedEvents = useMemo(() => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const groups = events.reduce((acc, ev) => {
              if (ev.end && ev.end < today) return acc;
              const dateStr = ev.start.toLocaleDateString('he-IL', { weekday: 'long', year: 'numeric', month: 'numeric', day: 'numeric' });
              if (!acc[dateStr]) acc[dateStr] = [];
              acc[dateStr].push(ev);
              return acc;
            }, {});

            return groups;
          }, [events]);

          const LandingView = () => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-b from-blue-50 to-white animate-fade-in text-center">
              <div className="bg-blue-600 p-4 rounded-full mb-6 shadow-lg shadow-blue-200">
                 <CalendarIcon className="w-10 h-10 text-white" />
              </div>
              <h1 className="text-3xl font-bold text-gray-900 mb-3 tracking-tight">רשימת מטלות Moodle</h1>
              <p className="text-gray-600 mb-8 text-lg leading-relaxed max-w-sm">
                סנכרון אוטומטי של כל המטלות, השיעורים והאירועים שלך ישר לטלפון. עקוב אחרי מה שביצעת בקלות.
              </p>
              
              <div className="relative mb-10 w-full max-w-xs mx-auto">
                 <div className="absolute inset-0 bg-blue-100 rounded-2xl transform rotate-3"></div>
                 <img 
                    src="./landing-image.png" 
                    alt="תצוגה מקדימה" 
                    className="relative rounded-2xl shadow-xl border border-gray-100 w-full object-cover"
                    onError={(e) => { e.target.style.display = 'none'; }}
                 />
              </div>

              <button 
                onClick={() => setView('register')}
                className="w-full max-w-sm bg-blue-600 text-white font-semibold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition active:scale-95 flex items-center justify-center gap-2 text-lg"
              >
                להרשמה <ArrowRight className="w-5 h-5 rotate-180" />
              </button>
            </div>
          );

          const RegisterView = () => (
            <div className="min-h-screen bg-white animate-slide-up pb-10">
              <div className="bg-blue-600 px-6 pt-12 pb-6 text-white rounded-b-3xl shadow-md">
                <h1 className="text-2xl font-bold mb-2">חיבור היומן שלך</h1>
                <p className="text-blue-100 text-sm">כמה צעדים פשוטים ואנחנו מסונכרנים.</p>
              </div>

              <div className="px-6 py-8 max-w-md mx-auto space-y-6">
                <div className="space-y-4">
                  <div className="flex gap-4 items-start">
                    <div className="bg-blue-100 text-blue-700 font-bold w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">1</div>
                    <div className="text-gray-700">
                      היכנסו לאתר Moodle בקישור הבא:<br/>
                      <a href="https://moodle.tau.ac.il/calendar/export.php?" target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 mt-2 text-blue-600 font-medium bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100">
                        <LinkIcon className="w-4 h-4"/> למעבר לעמוד הייצוא במודל
                      </a>
                    </div>
                  </div>

                  <div className="flex gap-4 items-start">
                    <div className="bg-blue-100 text-blue-700 font-bold w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">2</div>
                    <div className="text-gray-700 leading-relaxed">
                      תחת <strong>אירועים ליצוא</strong> סמנו את <strong>"כל האירועים"</strong>.<br/>
                      תחת <strong>מסגרת זמן</strong> סמנו את <strong>"60 הימים שזה עתה חלפו ו60 הימים הבאים"</strong>.
                    </div>
                  </div>

                  <img 
                    src="./instruction-image.png" 
                    alt="הוראות מודל" 
                    className="w-full rounded-xl border border-gray-200 shadow-sm mr-12 max-w-[85%]"
                    onError={(e) => { e.target.style.display = 'none'; }}
                  />

                  <div className="flex gap-4 items-start">
                    <div className="bg-blue-100 text-blue-700 font-bold w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">3</div>
                    <div className="text-gray-700">לחצו על הכפתור הכחול למטה: <strong>"השג את כתובת ה-URL של לוח השנה"</strong>.</div>
                  </div>

                  <div className="flex gap-4 items-start">
                    <div className="bg-blue-100 text-blue-700 font-bold w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">4</div>
                    <div className="text-gray-700">לחצו על <strong>"העתקת כתובת URL"</strong> והדביקו אותה בתיבה כאן למטה:</div>
                  </div>
                </div>

                <form onSubmit={handleRegisterSubmit} className="mt-8 bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-inner">
                  <label className="block text-sm font-semibold text-gray-700 mb-2">כתובת ה-URL שהעתקת:</label>
                  <input 
                    type="url" 
                    required
                    value={registerUrl}
                    onChange={(e) => setRegisterUrl(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-left"
                    placeholder="https://moodle.tau.ac.il/..."
                    dir="ltr"
                  />
                  
                  {error && (
                    <div className="mt-3 text-red-600 text-sm flex items-start gap-1.5 bg-red-50 p-2.5 rounded-lg border border-red-100">
                      <AlertCircle className="w-4 h-4 mt-0.5 flex-shrink-0" />
                      <span>{error}</span>
                    </div>
                  )}

                  <button 
                    type="submit" 
                    disabled={registering}
                    className="mt-4 w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-blue-700 active:scale-95 transition disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center gap-2"
                  >
                    {registering ? <RefreshCw className="w-5 h-5 animate-spin" /> : 'שמור והתחבר'}
                  </button>
                  
                  <button type="button" onClick={() => setView('landing')} className="mt-3 w-full text-center text-gray-500 text-sm py-2">
                    חזרה אחורה
                  </button>
                </form>
              </div>
            </div>
          );

          const CalendarView = () => (
            <div className="min-h-screen pb-20 animate-fade-in max-w-lg mx-auto">
              <div className="sticky top-0 z-20 bg-white/90 backdrop-blur-md border-b border-gray-200 px-5 py-4 shadow-sm flex justify-between items-center">
                <div>
                  <h1 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <CalendarIcon className="w-6 h-6 text-blue-600" />
                    המטלות שלי
                  </h1>
                  {lastUpdated && (
                    <p className="text-xs text-gray-500 mt-1 flex items-center gap-1">
                      <RefreshCw className="w-3 h-3" />
                      עודכן: {new Date(lastUpdated).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}
                    </p>
                  )}
                </div>
                
                <div className="flex gap-2">
                  <button 
                    onClick={() => { fetchEvents(uid); fetchCompletedTasks(uid); }}
                    disabled={loading}
                    className="p-2.5 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition active:scale-90"
                  >
                    <RefreshCw className={`w-5 h-5 ${loading ? 'animate-spin' : ''}`} />
                  </button>
                  <button 
                    onClick={handleLogout}
                    className="p-2.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition active:scale-90"
                  >
                    <LogOut className="w-5 h-5" />
                  </button>
                </div>
              </div>

              {error && (
                <div className="m-4 bg-red-50 border border-red-200 p-4 rounded-xl flex gap-3 shadow-sm">
                  <AlertCircle className="w-6 h-6 text-red-500 flex-shrink-0" />
                  <p className="text-red-700 text-sm leading-tight">{error}</p>
                </div>
              )}

              <div className="p-4 space-y-6">
                {!loading && Object.keys(groupedEvents).length === 0 && !error && (
                  <div className="text-center py-12 bg-white rounded-3xl border border-gray-100 shadow-sm mt-8">
                    <div className="bg-gray-50 w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4">
                      <CalendarIcon className="w-10 h-10 text-gray-300" />
                    </div>
                    <h3 className="text-lg font-bold text-gray-700">הכל נקי!</h3>
                    <p className="text-gray-500 mt-1 text-sm">אין מטלות או אירועים עתידיים.</p>
                  </div>
                )}

                {Object.entries(groupedEvents).map(([dateLabel, dayEvents]) => (
                  <div key={dateLabel} className="space-y-3">
                    <h2 className="text-sm font-bold text-gray-500 bg-gray-100/80 px-4 py-1.5 rounded-full inline-block">
                      {dateLabel}
                    </h2>
                    <div className="space-y-3">
                      {dayEvents.map((ev, idx) => {
                        const isCompleted = completedIds[ev.id];
                        
                        return (
                        <label key={idx} className={`block bg-white rounded-2xl p-4 shadow-sm border border-gray-100 transition-all relative overflow-hidden group active:scale-[0.98] cursor-pointer ${isCompleted ? 'opacity-60 bg-gray-50' : 'hover:shadow-md'}`}>
                          <div className={`absolute top-0 right-0 w-1.5 h-full transition-colors ${isCompleted ? 'bg-green-500' : 'bg-blue-500'}`} />
                          
                          <div className="flex items-start gap-3.5 pr-1">
                            <input 
                              type="checkbox" 
                              checked={!!isCompleted}
                              onChange={async () => {
                                const newState = !isCompleted;
                                
                                const newCompleted = { ...completedIds };
                                if (newState) newCompleted[ev.id] = true;
                                else delete newCompleted[ev.id];
                                
                                setCompletedIds(newCompleted);
                                localStorage.setItem('moodle_completed', JSON.stringify(newCompleted));

                                try {
                                  await fetch('https://pages-api4.vercel.app/api/tasks', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ uid: uid, id: ev.id, isCompleted: newState })
                                  });
                                } catch (error) { console.error("API error", error); }
                              }}
                              className="mt-1 text-blue-600 focus:ring-blue-500 border-gray-300"
                            />
                            
                            <div className="flex-1 min-w-0">
                              <h3 className={`text-base font-bold mb-1.5 ${isCompleted ? 'line-through text-gray-400' : 'text-gray-900'}`}>
                                {ev.title}
                              </h3>
                              
                              <div className="flex flex-wrap gap-2 text-xs font-medium text-gray-600">
                                {ev.course && (
                                  <div className="flex items-center gap-1 bg-blue-50 text-blue-700 px-2.5 py-1 rounded-md border border-blue-100 max-w-full">
                                    <Book className="w-3.5 h-3.5 flex-shrink-0" />
                                    <span className="truncate">{ev.course}</span>
                                  </div>
                                )}

                                <div className="flex items-center gap-1 bg-gray-50 px-2.5 py-1 rounded-md border border-gray-100 flex-shrink-0">
                                  <Clock className="w-3.5 h-3.5 text-blue-500" />
                                  <span>
                                    {ev.start.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}
                                    {ev.end && ` - ${ev.end.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}`}
                                  </span>
                                </div>
                                
                                {ev.location && (
                                  <div className="flex items-center gap-1 bg-gray-50 px-2.5 py-1 rounded-md border border-gray-100 max-w-full">
                                    <MapPin className="w-3.5 h-3.5 text-red-500 flex-shrink-0" />
                                    <span className="truncate">{ev.location}</span>
                                  </div>
                                )}
                              </div>

                              {ev.description && (
                                <div className="mt-3 pt-3 border-t border-gray-100 text-xs text-gray-500 whitespace-pre-wrap">
                                  {ev.description}
                                </div>
                              )}
                            </div>
                          </div>
                        </label>
                      )})}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          if (view === 'landing') return <LandingView />;
          if (view === 'register') return <RegisterView />;
          return <CalendarView />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
