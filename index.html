<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח אירועים - תל אביב</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (לקריאת קוד React בדפדפן) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS (לעיצוב) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap');
        body { font-family: 'Rubik', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // הגדרת האייקונים בצורה פנימית כדי למנוע שגיאות של lucideReact
        const Settings = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>);
        const CalendarIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>);
        const MapPin = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>);
        const Clock = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
        const AlertCircle = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>);
        const RefreshCw = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
        const LogOut = ({className, title}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><title>{title}</title><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>);
        const AlignRight = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="21" x2="3" y1="6" y2="6"/><line x1="21" x2="9" y1="12" y2="12"/><line x1="21" x2="7" y1="18" y2="18"/></svg>);
        const Book = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>);

        function App() {
          const [uid, setUid] = useState(localStorage.getItem('moodle_uid') || '');
          const [token, setToken] = useState(localStorage.getItem('moodle_token') || '');
          const [useProxy, setUseProxy] = useState(localStorage.getItem('moodle_use_proxy') !== 'false');
          const [lastUpdated, setLastUpdated] = useState(() => localStorage.getItem('moodle_last_updated') || null);
          
          const [events, setEvents] = useState(() => {
            try {
              const saved = localStorage.getItem('moodle_events');
              if (saved) {
                const parsed = JSON.parse(saved);
                return parsed.map(ev => ({
                  ...ev,
                  start: new Date(ev.start),
                  end: ev.end ? new Date(ev.end) : undefined
                }));
              }
            } catch (e) {
              console.error("Failed to parse events", e);
            }
            return [];
          });
          
          const [completedIds, setCompletedIds] = useState(() => {
            try {
              const saved = localStorage.getItem('moodle_completed');
              return saved ? JSON.parse(saved) : {};
            } catch (e) {
              return {};
            }
          });

          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          
          const [view, setView] = useState((uid && token) ? 'calendar' : 'settings');

          // Parse ICS string into JSON objects
          const parseICS = (icsString) => {
            const unfolded = icsString.replace(/\r?\n /g, '');
            const lines = unfolded.split(/\r?\n/);
            
            const parsedEvents = [];
            let currentEvent = null;

            for (let line of lines) {
              if (line.startsWith('BEGIN:VEVENT')) {
                currentEvent = {};
              } else if (line.startsWith('END:VEVENT')) {
                if (currentEvent) {
                  parsedEvents.push(currentEvent);
                }
                currentEvent = null;
              } else if (currentEvent) {
                const splitIndex = line.indexOf(':');
                if (splitIndex > -1) {
                  const keyParams = line.substring(0, splitIndex).split(';');
                  const key = keyParams[0];
                  const value = line.substring(splitIndex + 1);

                  if (key === 'SUMMARY') currentEvent.title = value.replace(/\\,/g, ',');
                  if (key === 'DTSTART') currentEvent.start = parseICSDate(value);
                  if (key === 'DTEND') currentEvent.end = parseICSDate(value);
                  if (key === 'LOCATION') currentEvent.location = value.replace(/\\,/g, ',');
                  if (key === 'DESCRIPTION') currentEvent.description = value.replace(/\\n/g, '\n');
                  if (key === 'UID') currentEvent.id = value;
                  if (key === 'CATEGORIES') currentEvent.course = value.replace(/\\,/g, ',');
                }
              }
            }
            
            return parsedEvents.map(ev => {
              if (!ev.id) ev.id = `${ev.title}-${ev.start?.getTime()}`;
              return ev;
            }).sort((a, b) => a.start - b.start);
          };

          // Convert ICS date strings to JS Date objects
          const parseICSDate = (icsDate) => {
            const d = icsDate.replace(/[^0-9TZ]/g, '');
            if (d.length >= 8) {
              const year = d.substring(0, 4);
              const month = d.substring(4, 6) - 1;
              const day = d.substring(6, 8);
              
              if (d.length >= 15) {
                const hour = d.substring(9, 11);
                const min = d.substring(11, 13);
                const sec = d.substring(13, 15);
                const isUTC = d.endsWith('Z');
                if (isUTC) {
                  return new Date(Date.UTC(year, month, day, hour, min, sec));
                }
                return new Date(year, month, day, hour, min, sec);
              }
              return new Date(year, month, day);
            }
            return new Date();
          };

          // Fetch events from Moodle
          const fetchEvents = async () => {
            if (!uid || !token) return;
            
            setLoading(true);
            setError(null);
            
            const cleanUid = uid.trim();
            const cleanToken = token.trim();
            
            const moodleUrl = `https://moodle.tau.ac.il/calendar/export_execute.php?userid=${cleanUid}&authtoken=${cleanToken}&preset_what=all&preset_time=custom`;
            
            const fetchUrl = useProxy ? `https://cors-anywhere.herokuapp.com/${moodleUrl}` : moodleUrl;

            try {
              const response = await fetch(fetchUrl);
              if (!response.ok) {
                 if (useProxy && response.status === 403) {
                     throw new Error(`שגיאה 403. כדי להשתמש בפרוקסי הזה, עליך לאשר גישה זמנית. פתח כרטיסייה חדשה וגלוש לכתובת: https://cors-anywhere.herokuapp.com/corsdemo ולחץ על הכפתור "Request temporary access", לאחר מכן חזור לכאן ונסה שוב.`);
                 }
                throw new Error(`שגיאה בתקשורת מול השרת (קוד שגיאה: ${response.status}).`);
              }
              const icsText = await response.text();
              
              if (!icsText.includes('BEGIN:VCALENDAR')) {
                throw new Error('התקבל קובץ לא תקין. ייתכן שהטוקן פג תוקף, שגוי, או שחומת האש של האוניברסיטה חוסמת את הבקשה.');
              }

              const parsed = parseICS(icsText);
              setEvents(parsed);
              localStorage.setItem('moodle_events', JSON.stringify(parsed));
              
              const now = new Date().toISOString();
              setLastUpdated(now);
              localStorage.setItem('moodle_last_updated', now);
              
            } catch (err) {
              setError(err.message === 'Failed to fetch' 
                ? 'שגיאת רשת. הדפדפן חוסם את הבקשה (CORS). נסה להשתמש בתוסף CORS לדפדפן (וודא שכיבית את הפרוקסי בהגדרות), או נסה את אופציית הפרוקסי.' 
                : err.message);
            } finally {
              setLoading(false);
            }
          };

          useEffect(() => {
            if (view === 'calendar' && uid && token) {
              if (events.length === 0) {
                fetchEvents();
              }
            }
          }, [view]);

          const groupedEvents = useMemo(() => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const groups = events.reduce((acc, ev) => {
              if (ev.end && ev.end < today) return acc;

              const dateStr = ev.start.toLocaleDateString('he-IL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
              if (!acc[dateStr]) acc[dateStr] = [];
              acc[dateStr].push(ev);
              return acc;
            }, {});

            return groups;
          }, [events]);

          const handleSaveSettings = (e) => {
            e.preventDefault();
            localStorage.setItem('moodle_uid', uid);
            localStorage.setItem('moodle_token', token);
            localStorage.setItem('moodle_use_proxy', useProxy);
            setView('calendar');
          };

          const handleLogout = () => {
            localStorage.removeItem('moodle_uid');
            localStorage.removeItem('moodle_token');
            localStorage.removeItem('moodle_events');
            localStorage.removeItem('moodle_completed');
            localStorage.removeItem('moodle_last_updated');
            setUid('');
            setToken('');
            setEvents([]);
            setCompletedIds({});
            setLastUpdated(null);
            setView('settings');
          };

          const SettingsView = () => (
            <div className="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 mt-8">
              <div className="bg-blue-600 p-6 text-white text-center">
                <CalendarIcon className="w-12 h-12 mx-auto mb-3 opacity-90" />
                <h2 className="text-2xl font-bold">הגדרות חיבור ל-Moodle</h2>
                <p className="text-blue-100 text-sm mt-2 opacity-90">הנתונים נשמרים בדפדפן שלך בלבד</p>
              </div>
              
              <form onSubmit={handleSaveSettings} className="p-6 space-y-6">
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">מזהה משתמש (User ID)</label>
                  <input 
                    type="text" 
                    required
                    value={uid}
                    onChange={(e) => setUid(e.target.value)}
                    className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                    placeholder="לדוגמה: 12345"
                    dir="ltr"
                  />
                </div>
                
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">טוקן אימות (Auth Token)</label>
                  <input 
                    type="text" 
                    required
                    value={token}
                    onChange={(e) => setToken(e.target.value)}
                    className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                    placeholder="הכנס את הטוקן כאן..."
                    dir="ltr"
                  />
                </div>

                <div className="bg-orange-50 border border-orange-200 rounded-lg p-4">
                  <label className="flex items-start cursor-pointer">
                    <div className="flex-shrink-0 mt-0.5">
                      <input 
                        type="checkbox" 
                        checked={useProxy}
                        onChange={(e) => setUseProxy(e.target.checked)}
                        className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                      />
                    </div>
                    <div className="mr-3">
                      <span className="block text-sm font-medium text-gray-900">השתמש בפרוקסי (cors-anywhere)</span>
                      <span className="block text-xs text-gray-500 mt-1">
                        דורש אישור גישה. אם תקבל שגיאה 403, עקוב אחר ההוראות בהודעת השגיאה.
                      </span>
                    </div>
                  </label>
                </div>

                <button 
                  type="submit" 
                  className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md hover:shadow-lg"
                >
                  שמור והצג אירועים
                </button>
              </form>
            </div>
          );

          const CalendarView = () => (
            <div className="max-w-3xl mx-auto py-8">
              <div className="flex flex-col sm:flex-row justify-between items-center bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-100 mb-6 gap-4">
                <div>
                  <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <CalendarIcon className="w-8 h-8 text-blue-600" />
                    לוח אירועים - תל אביב
                  </h1>
                  <div className="text-sm text-gray-500 mt-2 flex flex-col sm:flex-row sm:gap-4">
                    <span>מוצגים אירועים החל מהיום</span>
                    {lastUpdated && (
                      <span className="flex items-center gap-1.5 text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md w-fit mt-1 sm:mt-0">
                        <RefreshCw className="w-3 h-3" />
                        עודכן לאחרונה: {new Date(lastUpdated).toLocaleString('he-IL', { dateStyle: 'short', timeStyle: 'short' })}
                      </span>
                    )}
                  </div>
                </div>
                
                <div className="flex gap-3 w-full sm:w-auto">
                  <button 
                    onClick={fetchEvents}
                    disabled={loading}
                    className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-blue-50 text-blue-700 hover:bg-blue-100 px-4 py-2 rounded-lg font-medium transition-colors"
                  >
                    <RefreshCw className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} />
                    {loading ? 'טוען...' : 'רענן'}
                  </button>
                  <button 
                    onClick={() => setView('settings')}
                    className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-gray-50 text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-lg font-medium transition-colors border border-gray-200"
                  >
                    <Settings className="w-4 h-4" />
                    הגדרות
                  </button>
                  <button 
                    onClick={handleLogout}
                    title="התנתק ומחק נתונים"
                    className="flex items-center justify-center p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                  >
                    <LogOut className="w-5 h-5" />
                  </button>
                </div>
              </div>

              {error && (
                <div className="bg-red-50 border-r-4 border-red-500 p-4 rounded-lg mb-6 flex gap-3 shadow-sm">
                  <AlertCircle className="w-6 h-6 text-red-500 flex-shrink-0" />
                  <p className="text-red-700">{error}</p>
                </div>
              )}

              {!loading && Object.keys(groupedEvents).length === 0 && !error && (
                <div className="text-center py-16 bg-white rounded-2xl border border-gray-100 shadow-sm">
                  <CalendarIcon className="w-16 h-16 mx-auto text-gray-300 mb-4" />
                  <h3 className="text-xl font-semibold text-gray-700">אין אירועים קרובים</h3>
                  <p className="text-gray-500 mt-2">הלוח שלך ריק מאירועים עתידיים כרגע.</p>
                </div>
              )}

              <div className="space-y-8 px-2">
                {Object.entries(groupedEvents).map(([dateLabel, dayEvents]) => (
                  <div key={dateLabel} className="animate-fade-in">
                    <h2 className="text-lg font-bold text-gray-800 mb-4 sticky top-0 bg-gray-50/95 backdrop-blur py-2 border-b-2 border-blue-100 z-10">
                      {dateLabel}
                    </h2>
                    <div className="space-y-4">
                      {dayEvents.map((ev, idx) => {
                        const isCompleted = completedIds[ev.id];
                        
                        return (
                        <div key={idx} className={`bg-white rounded-xl p-5 shadow-sm border border-gray-100 transition-all relative overflow-hidden group ${isCompleted ? 'opacity-60 bg-gray-50' : 'hover:shadow-md'}`}>
                          <div className={`absolute top-0 right-0 w-1.5 h-full transition-colors ${isCompleted ? 'bg-green-500' : 'bg-blue-500 group-hover:bg-blue-600'}`} />
                          
                          <div className="flex items-start gap-3 pr-2">
                            <input 
                              type="checkbox" 
                              title="סמן כהושלם"
                              checked={!!isCompleted}
                              onChange={() => {
                                const newCompleted = { ...completedIds, [ev.id]: !isCompleted };
                                setCompletedIds(newCompleted);
                                localStorage.setItem('moodle_completed', JSON.stringify(newCompleted));
                              }}
                              className="mt-1.5 w-5 h-5 rounded border-gray-300 text-green-600 focus:ring-green-500 cursor-pointer flex-shrink-0"
                            />
                            
                            <div className="flex-1">
                              <h3 className={`text-lg font-bold mb-2 ${isCompleted ? 'line-through text-gray-500' : 'text-gray-900'}`}>{ev.title}</h3>
                              
                              <div className="flex flex-wrap gap-3 text-sm text-gray-600">
                                {ev.course && (
                                  <div className="flex items-center gap-1.5 bg-blue-50 text-blue-700 px-3 py-1.5 rounded-md font-medium border border-blue-100">
                                    <Book className="w-4 h-4" />
                                    <span>{ev.course}</span>
                                  </div>
                                )}

                                <div className="flex items-center gap-1.5 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-100">
                                  <Clock className="w-4 h-4 text-blue-500" />
                                  <span>
                                    {ev.start.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}
                                    {ev.end && ` - ${ev.end.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}`}
                                  </span>
                                </div>
                                
                                {ev.location && (
                                  <div className="flex items-center gap-1.5 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-100">
                                    <MapPin className="w-4 h-4 text-red-500" />
                                    <span>{ev.location}</span>
                                  </div>
                                )}
                              </div>

                              {ev.description && (
                                <div className="mt-4 pt-4 border-t border-gray-100 text-sm text-gray-600 whitespace-pre-wrap flex items-start gap-2">
                                  <AlignRight className="w-4 h-4 text-gray-400 mt-0.5 flex-shrink-0" />
                                  <div>{ev.description}</div>
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      )})}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          return (
            <div className="container mx-auto px-4 max-w-5xl">
              {view === 'settings' ? <SettingsView /> : <CalendarView />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
