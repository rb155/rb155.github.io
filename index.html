<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח אירועים - תל אביב</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (לקריאת קוד React בדפדפן) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS (לעיצוב) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap');
        body { font-family: 'Rubik', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // הגדרת האייקונים (ללא סמלי הגדרות והתנתקות שאין בהם צורך יותר)
        const CalendarIcon = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>);
        const MapPin = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>);
        const Clock = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
        const AlertCircle = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>);
        const RefreshCw = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
        const AlignRight = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="21" x2="3" y1="6" y2="6"/><line x1="21" x2="9" y1="12" y2="12"/><line x1="21" x2="7" y1="18" y2="18"/></svg>);
        const Book = ({className}) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>);

        function App() {
          const [lastUpdated, setLastUpdated] = useState(() => localStorage.getItem('moodle_last_updated') || null);
          
          const [events, setEvents] = useState(() => {
            try {
              const saved = localStorage.getItem('moodle_events');
              if (saved) {
                const parsed = JSON.parse(saved);
                return parsed.map(ev => ({
                  ...ev,
                  start: new Date(ev.start),
                  end: ev.end ? new Date(ev.end) : undefined
                }));
              }
            } catch (e) {
              console.error("Failed to parse events", e);
            }
            return [];
          });
          
          const [completedIds, setCompletedIds] = useState(() => {
            try {
              const saved = localStorage.getItem('moodle_completed');
              return saved ? JSON.parse(saved) : {};
            } catch (e) {
              return {};
            }
          });

          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);

          // שאיבת המשימות שהושלמו מהשרת
          const fetchCompletedTasks = async () => {
            try {
              const response = await fetch('https://pages-api4.vercel.app/api/tasks');
              if (response.ok) {
                const data = await response.json();
                setCompletedIds(data || {});
                // עדכון המטמון המקומי כדי שהאתר יעלה מהר יותר בפעם הבאה
                localStorage.setItem('moodle_completed', JSON.stringify(data || {}));
              }
            } catch (error) {
              console.error("Error fetching tasks", error);
            }
          };

          // שאיבת האירועים מהשרת שלנו
          const fetchEvents = async () => {
            setLoading(true);
            setError(null);
            
            try {
              const response = await fetch('https://pages-api4.vercel.app/api/events');
              
              if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `שגיאה בתקשורת מול השרת (קוד ${response.status}).`);
              }
              
              const data = await response.json();
              
              // המרת המחרוזות חזרה לאובייקטים של תאריך
              const formattedEvents = data.map(ev => ({
                ...ev,
                start: new Date(ev.start),
                end: ev.end ? new Date(ev.end) : undefined
              }));

              setEvents(formattedEvents);
              localStorage.setItem('moodle_events', JSON.stringify(formattedEvents));
              
              const now = new Date().toISOString();
              setLastUpdated(now);
              localStorage.setItem('moodle_last_updated', now);
              
            } catch (err) {
              setError(err.message);
            } finally {
              setLoading(false);
            }
          };

          // מופעל אוטומטית כשהאתר עולה
          useEffect(() => {
            if (events.length === 0) {
              fetchEvents();
            }
            fetchCompletedTasks();
          }, []);

          // קיבוץ אירועים לפי ימים
          const groupedEvents = useMemo(() => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const groups = events.reduce((acc, ev) => {
              if (ev.end && ev.end < today) return acc;

              const dateStr = ev.start.toLocaleDateString('he-IL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
              if (!acc[dateStr]) acc[dateStr] = [];
              acc[dateStr].push(ev);
              return acc;
            }, {});

            return groups;
          }, [events]);

          return (
            <div className="container mx-auto px-4 max-w-5xl">
              <div className="max-w-3xl mx-auto py-8">
                <div className="flex flex-col sm:flex-row justify-between items-center bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-100 mb-6 gap-4">
                  <div>
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <CalendarIcon className="w-8 h-8 text-blue-600" />
                      לוח אירועים - תל אביב
                    </h1>
                    <div className="text-sm text-gray-500 mt-2 flex flex-col sm:flex-row sm:gap-4">
                      <span>מוצגים אירועים החל מהיום</span>
                      {lastUpdated && (
                        <span className="flex items-center gap-1.5 text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md w-fit mt-1 sm:mt-0">
                          <RefreshCw className="w-3 h-3" />
                          עודכן לאחרונה: {new Date(lastUpdated).toLocaleString('he-IL', { dateStyle: 'short', timeStyle: 'short' })}
                        </span>
                      )}
                    </div>
                  </div>
                  
                  <div className="flex w-full sm:w-auto">
                    <button 
                      onClick={() => { fetchEvents(); fetchCompletedTasks(); }}
                      disabled={loading}
                      className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-blue-50 text-blue-700 hover:bg-blue-100 px-6 py-2.5 rounded-lg font-medium transition-colors"
                    >
                      <RefreshCw className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} />
                      {loading ? 'טוען...' : 'רענן נתונים'}
                    </button>
                  </div>
                </div>

                {error && (
                  <div className="bg-red-50 border-r-4 border-red-500 p-4 rounded-lg mb-6 flex gap-3 shadow-sm">
                    <AlertCircle className="w-6 h-6 text-red-500 flex-shrink-0" />
                    <p className="text-red-700">{error}</p>
                  </div>
                )}

                {!loading && Object.keys(groupedEvents).length === 0 && !error && (
                  <div className="text-center py-16 bg-white rounded-2xl border border-gray-100 shadow-sm">
                    <CalendarIcon className="w-16 h-16 mx-auto text-gray-300 mb-4" />
                    <h3 className="text-xl font-semibold text-gray-700">אין אירועים קרובים</h3>
                    <p className="text-gray-500 mt-2">הלוח שלך ריק מאירועים עתידיים כרגע.</p>
                  </div>
                )}

                <div className="space-y-8 px-2">
                  {Object.entries(groupedEvents).map(([dateLabel, dayEvents]) => (
                    <div key={dateLabel} className="animate-fade-in">
                      <h2 className="text-lg font-bold text-gray-800 mb-4 sticky top-0 bg-gray-50/95 backdrop-blur py-2 border-b-2 border-blue-100 z-10">
                        {dateLabel}
                      </h2>
                      <div className="space-y-4">
                        {dayEvents.map((ev, idx) => {
                          const isCompleted = completedIds[ev.id];
                          
                          return (
                          <div key={idx} className={`bg-white rounded-xl p-5 shadow-sm border border-gray-100 transition-all relative overflow-hidden group ${isCompleted ? 'opacity-60 bg-gray-50' : 'hover:shadow-md'}`}>
                            <div className={`absolute top-0 right-0 w-1.5 h-full transition-colors ${isCompleted ? 'bg-green-500' : 'bg-blue-500 group-hover:bg-blue-600'}`} />
                            
                            <div className="flex items-start gap-3 pr-2">
                              <input 
                                type="checkbox" 
                                title="סמן כהושלם"
                                checked={!!isCompleted}
                                onChange={async () => {
                                  const newState = !isCompleted;
                                  
                                  // 1. עדכון מיידי של ממשק המשתמש
                                  const newCompleted = { ...completedIds };
                                  if (newState) {
                                    newCompleted[ev.id] = true;
                                  } else {
                                    delete newCompleted[ev.id];
                                  }
                                  setCompletedIds(newCompleted);
                                  localStorage.setItem('moodle_completed', JSON.stringify(newCompleted));

                                  // 2. שליחת העדכון למסד הנתונים ב-Vercel
                                  try {
                                    await fetch('https://pages-api4.vercel.app/api/tasks', {
                                      method: 'POST',
                                      headers: { 'Content-Type': 'application/json' },
                                      body: JSON.stringify({ id: ev.id, isCompleted: newState })
                                    });
                                  } catch (error) {
                                    console.error("Failed to save to database", error);
                                  }
                                }}
                                className="mt-1.5 w-5 h-5 rounded border-gray-300 text-green-600 focus:ring-green-500 cursor-pointer flex-shrink-0"
                              />
                              
                              <div className="flex-1">
                                <h3 className={`text-lg font-bold mb-2 ${isCompleted ? 'line-through text-gray-500' : 'text-gray-900'}`}>{ev.title}</h3>
                                
                                <div className="flex flex-wrap gap-3 text-sm text-gray-600">
                                  {ev.course && (
                                    <div className="flex items-center gap-1.5 bg-blue-50 text-blue-700 px-3 py-1.5 rounded-md font-medium border border-blue-100">
                                      <Book className="w-4 h-4" />
                                      <span>{ev.course}</span>
                                    </div>
                                  )}

                                  <div className="flex items-center gap-1.5 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-100">
                                    <Clock className="w-4 h-4 text-blue-500" />
                                    <span>
                                      {ev.start.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}
                                      {ev.end && ` - ${ev.end.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}`}
                                    </span>
                                  </div>
                                  
                                  {ev.location && (
                                    <div className="flex items-center gap-1.5 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-100">
                                      <MapPin className="w-4 h-4 text-red-500" />
                                      <span>{ev.location}</span>
                                    </div>
                                  )}
                                </div>

                                {ev.description && (
                                  <div className="mt-4 pt-4 border-t border-gray-100 text-sm text-gray-600 whitespace-pre-wrap flex items-start gap-2">
                                    <AlignRight className="w-4 h-4 text-gray-400 mt-0.5 flex-shrink-0" />
                                    <div>{ev.description}</div>
                                  </div>
                                )}
                              </div>
                            </div>
                          </div>
                        )})}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
